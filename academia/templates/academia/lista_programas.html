{% extends "academia/base.html" %}
{% block title %}Programas{% endblock %}
{% block content %}
    <h2 class="mb-4">Programas Académicos</h2>
    <div class="row">
        {% for programa in programas %}
            <div class="col-md-6 mb-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">{{ programa.nombre }}</h5>
                        <p class="card-text text-muted">{{ programa.descripcion }}</p>
                        <a href="{% url 'academia:detalle_programa' programa.pk %}" class="btn btn-sm btn-dark">Ver detalle</a>
                    </div>
                </div>
            </div>
        {% empty %}
            <p class="text-muted">No hay programas registrados.</p>
        {% endfor %}
    </div>
{% endblock %}
