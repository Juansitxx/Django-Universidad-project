{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema Académico{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'academia:home' %}">🎓 Universidad</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'academia:lista_programas' %}">Programas</a>
                <a class="nav-link" href="{% url 'academia:lista_cursos' %}">Cursos</a>
                <a class="nav-link" href="{% url 'academia:lista_estudiantes' %}">Estudiantes</a>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-muted py-4 border-top mt-5">
        <small>&copy; 2025 Juan Perea- Juan Calderon.</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
